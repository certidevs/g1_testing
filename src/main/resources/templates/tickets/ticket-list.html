<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Mis Tickets')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0" th:text="${title}">Mis Tickets</h1>
        <span class="badge bg-primary fs-6" th:text="|${tickets.size()} tickets|">0 resultados</span>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="ticket : ${tickets}">
            <div class="card h-100 shadow-sm border-primary">
                <!-- Imagen de la película desde la sesión -->
                <img th:src="${ticket.session.movie.imageUrl}" class="card-img-top" alt="Póster" style="height: 200px; object-fit: cover;">

                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${ticket.session.movie.title}">Título Película</h5>

                    <div class="mb-3">
                        <p class="mb-1"><strong>Ubicación:</strong></p>
                        <span class="badge bg-dark">Fila: [[${ticket.row}]]</span>
                        <span class="badge bg-dark">Asiento: [[${ticket.seat}]]</span>
                    </div>

                    <div class="small text-muted mb-2">
                        <i class="fa-regular fa-calendar-days"></i>
                        <span th:text="${#temporals.format(ticket.session.dateTime, 'dd/MM/yyyy HH:mm')}">01/01/2024</span>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold fs-5 text-success" th:text="${#numbers.formatCurrency(ticket.price)}">10.00€</span>
                        <span th:classappend="${ticket.status.name() == 'LIBRE' ? 'badge bg-success' : 'badge bg-info'}"
                              th:text="${ticket.status}">Estado</span>
                    </div>
                </div>

                <div class="card-footer bg-transparent border-top-0 pb-3">
                    <!-- Botón para ver el QR o detalle del ticket -->
                    <a th:href="@{/tickets/{id}(id=${ticket.id})}"
                       class="btn btn-primary w-100">
                        <i class="fa-solid fa-qrcode me-1"></i> Ver Ticket
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
