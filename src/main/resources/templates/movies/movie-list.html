<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Cine')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0" th:text="${title}">Películas</h1>
        <span class="badge bg-secondary fs-6" th:text="|${numMovies} resultados|">0 resultados</span>
    </div>

    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-3">
        <div class="col" th:each="movie : ${movies}">
            <div class="card card-movie h-100 shadow-sm">
                <img th:src="${movie.getImageUrl}" class="card-img-top" alt="Film card">
                <div class="card-body">
                    <h5 class="card-title" th:text="${movie.title}">Nombre</h5>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <span th:text="${movie.releaseYear}">0</span>
                        </span>
                    </p>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <span th:text="${movie.genres}">0</span>
                        </span>
                    </p>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <span th:text="${movie.minAge}">0</span>
                        </span>
                    </p>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <span th:text="${movie.duration}">0</span>
                        </span>
                    </p>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <span th:text="${movie.trailerUrl}">0</span>
                        </span>
                    </p>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <span th:text="${movie.director}">0</span>
                        </span>
                    </p>
                    <p class="card-text" th:text="${movie.sinopsis}"></p>
                    <div class="card-footer bg-transparent border-0 pt-0">
                        <a th:href="@{/movies/{id}(id=${movie.id})}"
                           class="btn btn-outline-primary btn-sm w-100">
                            <i class="fa-regular fa-eye me-1"></i> Ver película
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
