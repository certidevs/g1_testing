<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Salas</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/dist/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/7.2.0/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="d-flex flex-column min-vh-100">
<!--
<nav th:replace="~{layout/navbar :: navbar}"></nav>
-->
<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Salas</h1>
        <a th:href="@{/salas}" class="btn btn-primary">
            <i class="fa-solid fa-arrow-left"></i> Volver al listado
        </a>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0 text-muted">
            / Salas / Ver Sala
        </h5>
    </div>
    <div class="card">
        <div class="card-header d-flex align-items-center gap-2">
            <i class="fa-solid fa-chalkboard"></i>
            <h4 class="mb-0"
                th:text="${room.get().name != null ? room.get().name : '(Sin nombre)'}">
                Sala 1
            </h4>
        </div>
        <div class="card-body">
            <table class="table table-borderless mt-3">
                <tbody>

                    <tr>
                        <th class="w-35" scope="col">Nombre: </th>
                        <td class="w-75" th:text="${room.get().name != null ? room.get().name : '(Sin nombre)'}">
                            (Sin nombre)
                        </td>
                    </tr>

                    <tr>
                        <th scope="col">Tipo: </th>
                        <td th:switch="${room.get().screenType}">
                                <span th:case="${T(com.demo.model.enums.ScreenType).D4X}"><b>4DX</b></span>
                                <span th:case="${T(com.demo.model.enums.ScreenType).IMAX}"><b>IMAX</b></span>
                                <span th:case="${T(com.demo.model.enums.ScreenType).D3}"><b>3D</b></span>
                                <span th:case="${T(com.demo.model.enums.ScreenType).STANDARD}"><b>Estándar</b></span>
                                <span th:case="*"><b>Estándar</b></span>
                        </td>
                    </tr>

                    <tr>
                        <th scope="col">Capacidad: </th>
                        <td th:text="${room.get().capacity + ' personas'}">
                            100 personas
                        </td>
                    </tr>

                    <tr>
                        <th scope="col">Estado: </th>
                        <!-- incluir estado activa o inactiva-->
                    </tr>

                    <tr>
                        <th scope="col">Descripción: </th>
                        <!-- incluir descripcion de la sala-->
                    </tr>

                </tbody>
            </table>
            <a class="btn btn-outline-warning btn-sm">
                <i class="fa-solid fa-pencil"></i> Editar
            </a>

            <a class="btn btn-outline-danger btn-sm">
                <i class="fa-solid fa-trash-can"></i> Eliminar
            </a>
        </div>
    </div>
</main>
<!--
<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>
-->
</body>
</html>
